name: Stale Issues

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    name: Mark and close stale issues
    runs-on: ubuntu-latest
    steps:
      - name: Run stale bot
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/stale.yml
