name: Feature Request
description: Suggest an improvement or new feature.
title: "[Feature]: "
labels: [ELUSOC, enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape the ELUSOC roadmap.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: "As a user, I want ... so that ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution or change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds?
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who will benefit and how?
    validations:
      required: false
