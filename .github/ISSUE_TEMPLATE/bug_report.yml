name: Bug Report
description: Report something that is not working as expected.
title: '[Bug]: '
labels: [ELUSOC, bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug for the ELUSOC event.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Add relevant environment details.
      placeholder: 'OS, browser, Node.js version, etc.'
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste logs or add screenshots to help investigate.
    validations:
      required: false
